name: Deploy Web (GitHub Pages)

# Builds the Flutter web version and publishes it to GitHub Pages so it can
# be installed on a phone home screen as a PWA ("Add to Home Screen").
# The published URL is https://<owner>.github.io/mobile-game/.

on:
  push:
    branches: [main]
    # The leaderboard/feedback Actions commit these; they don't change the app,
    # so don't trigger a full rebuild+redeploy.
    paths-ignore:
      - 'leaderboard.json'
      - 'FEEDBACK.md'
      - '**/*.md'
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # base-href must match the Pages sub-path (/<repo-name>/).
      # --no-web-resources-cdn bundles CanvasKit locally so the PWA works
      # fully offline once added to the home screen.
      - name: Build web
        run: flutter build web --release --base-href /mobile-game/ --no-web-resources-cdn

      # Flutter's service worker doesn't honour SKIP_WAITING, so a new build
      # stays "waiting" forever on an installed iOS PWA. Append a message
      # handler so index.html can activate the new worker immediately.
      - name: Enable instant service-worker updates
        run: |
          cat >> build/web/flutter_service_worker.js <<'EOF'

          self.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'SKIP_WAITING') {
              self.skipWaiting();
            }
          });
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
