name: Build Android Release (.aab)

# Manually triggered from the GitHub website (Actions → Build Android Release
# → "Run workflow"). Builds a signed Play Store app bundle so no local dev
# machine is needed — download the .aab from the run's artifacts and upload it
# to the Play Console.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_PASSWORD      key password
#   ANDROID_KEY_ALIAS         key alias (e.g. "upload")
# Optional (for Firebase Analytics/Crashlytics in the release build):
#   GOOGLE_SERVICES_JSON      full contents of google-services.json

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fail early if signing secrets are missing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Add the"
            echo "::error::signing secrets first (see docs/BUILD-CI.md)."
            exit 1
          fi

      - name: Write signing keystore + key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Write google-services.json (if provided)
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            printf '%s' "$GSJ" > android/app/google-services.json
            echo "Firebase config written."
          else
            echo "No GOOGLE_SERVICES_JSON secret — building without Firebase."
          fi

      - run: flutter pub get

      - run: flutter build appbundle --release

      - name: Upload the app bundle
        uses: actions/upload-artifact@v4
        with:
          name: qubble-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload the R8 deobfuscation mapping
        uses: actions/upload-artifact@v4
        with:
          name: qubble-r8-mapping
          path: build/app/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      # Clean up secrets from the workspace (defensive; runners are ephemeral).
      - if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties android/app/google-services.json
